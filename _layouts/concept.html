<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} — Eticas AI Risk Taxonomy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 48rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #1a1a1a; }
    a { color: #0066cc; }
    code { background: #f4f4f4; padding: 0.15em 0.3em; border-radius: 3px; font-size: 0.9em; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ddd; padding: 0.5em 0.75em; text-align: left; }
    th { background: #f8f8f8; }
    blockquote { border-left: 3px solid #ddd; margin: 1em 0; padding: 0.5em 1em; color: #555; }
    .nav { font-size: 0.9em; margin-bottom: 2em; }
    .nav a { margin-right: 1em; }
    .badge { display: inline-block; padding: 0.2em 0.6em; border-radius: 3px; font-size: 0.8em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; vertical-align: middle; margin-right: 0.3em; }
    /* Inclusion badges */
    .badge-required { background: #e8f5e9; color: #2e7d32; }
    .badge-audit-dependent { background: #e3f2fd; color: #1565c0; }
    /* Maturity badges */
    .badge-established { background: #f5f5f5; color: #555; }
    .badge-developing { background: #fff3e0; color: #e65100; }
    .badge-provisional { background: #fce4ec; color: #c62828; border: 1px dashed #c62828; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/risk/">← All categories</a>
    {% if page.broader %}<a href="/risk/{{ page.broader }}">↑ {{ page.broader }}</a>{% endif %}
  </div>

  {{ content }}

  <hr>
  <p style="font-size: 0.85em; color: #666;">
    Part of the <a href="/risk/">Eticas AI Risk Taxonomy</a> v{{ site.data.config.version | default: "0.1.0" }}.
    URI: <code>{{ page.uri }}</code>
  </p>
</body>
</html>
