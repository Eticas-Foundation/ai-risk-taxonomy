# Eticas AI Risk Taxonomy — Source of Truth
# ==================================================
# Edit this file to modify the taxonomy.
# Run the build pipeline to regenerate outputs.
# See docs/implementation.md for details.

concepts:

  # ============================================================
  # 1. BIAS & FAIRNESS
  # ============================================================

  - id: bias-fairness
    type: category
    label: "Bias & Fairness"
    alt_labels:
      - "Fairness"
      - "Bias & Discrimination"
      - "Algorithmic fairness"
    definition: >
      The risk that an AI system produces outcomes that systematically
      advantage or disadvantage individuals or groups based on protected
      or sensitive attributes, leading to unequal treatment, reduced
      accuracy, or unjust impacts. This includes biases introduced
      through data, model design, or deployment context, and covers
      both measurable disparities and perceived unfairness in
      decision-making.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing, post-processing]
    inclusion: required
    maturity: established
    mappings:
      - framework: mit
        target_id: "domain-1"
        target_label: "Discrimination & Toxicity"
        relation: closeMatch
      - framework: nist_600
        target_id: "harmful-bias"
        target_label: "Harmful Bias & Homogenization"
        relation: closeMatch
      - framework: nist_rmf
        target_id: "fair"
        target_label: "Fair with Harmful Bias Managed"
        relation: closeMatch
      - framework: oecd
        target_id: "principle-1.2"
        target_label: "Human rights, rule of law, fairness & privacy"
        relation: broadMatch
      - framework: dpv_ai
        target_id: "AIBias"
        target_label: "AI Bias"
        relation: broadMatch
      - framework: iso_42001
        target_id: "A.8"
        target_label: "Assessing impacts of AI systems"
        relation: relatedMatch

  - id: dataset-bias
    type: subcategory
    broader: bias-fairness
    label: "Dataset bias and under/over-representation"
    definition: >
      Training or evaluation data that does not adequately represent
      all relevant population groups, leading to systematic performance
      differences or exclusion of certain groups.
    scope: ALL
    lifecycle_stages: [pre-processing]
    mappings:
      - framework: mit
        target_id: "subdomain-1.1"
        target_label: "Unfair discrimination & misrepresentation"
        relation: closeMatch

  - id: proxy-discrimination
    type: subcategory
    broader: bias-fairness
    label: "Proxy discrimination through correlated features"
    definition: >
      Discrimination through features that correlate with protected
      attributes (e.g., postcode as proxy for ethnicity), even when
      protected attributes are not directly used.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]

  - id: intersectional-unfairness
    type: subcategory
    broader: bias-fairness
    label: "Intersectional unfairness"
    definition: >
      Compounded disadvantage affecting individuals at the intersection
      of multiple protected characteristics (e.g., gender and ethnicity
      together producing worse outcomes than either alone).
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]

  - id: accessibility-barriers
    type: subcategory
    broader: bias-fairness
    label: "Accessibility barriers"
    definition: >
      System design that excludes or disadvantages people with
      disabilities, including inaccessible interfaces, outputs, or
      interaction modes.
    scope: ALL
    lifecycle_stages: [pre-processing, post-processing]

  - id: geographic-cultural-language-skew
    type: subcategory
    broader: bias-fairness
    label: "Geographic, cultural, or language skew"
    definition: >
      Systematic performance differences across geographies, cultures,
      or languages, often resulting from training data that
      overrepresents certain regions or linguistic traditions.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing, post-processing]

  - id: feedback-loops
    type: subcategory
    broader: bias-fairness
    label: "Feedback loops reinforcing inequality"
    definition: >
      System outputs that, when fed back into the system or its
      operational context, amplify existing biases over time.
    scope: ALL
    lifecycle_stages: [post-processing]

  - id: quality-of-service-disparity
    type: subcategory
    broader: bias-fairness
    label: "Quality of service disparity across groups"
    alt_labels:
      - "Quality of service"
    definition: >
      Inconsistent service quality across demographic groups, leading
      to systematically better performance for some groups over others.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  - id: allocation-of-opportunity
    type: subcategory
    broader: bias-fairness
    label: "Unequal allocation of opportunity"
    alt_labels:
      - "Allocation of opportunity"
    definition: >
      AI system outputs that lead to the uneven allocation of
      opportunities (e.g., jobs, credit, services) across demographic
      groups.
    scope: ADM
    lifecycle_stages: [post-processing]
    source: HRA

  - id: stereotyping-demeaning-content
    type: subcategory
    broader: bias-fairness
    label: "Stereotyping and demeaning content"
    alt_labels:
      - "Minimization of stereotyping"
    definition: >
      AI system outputs that reinforce, perpetuate, erase, or demean
      demographic groups through stereotypical representations or
      language.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]
    source: HRA
    mappings:
      - framework: mit
        target_id: "subdomain-1.1"
        target_label: "Unfair discrimination & misrepresentation"
        relation: closeMatch

  - id: harmful-content-toxicity
    type: subcategory
    broader: bias-fairness
    label: "Harmful content and toxicity"
    alt_labels:
      - "Toxicity"
      - "Harmful content prevention"
    definition: >
      Offensive, hateful, or otherwise harmful outputs that damage
      user well-being and erode trust.
    scope: LLM
    lifecycle_stages: [post-processing]
    source: HRA
    mappings:
      - framework: nist_600
        target_id: "dangerous-content"
        target_label: "Dangerous, Violent, or Hateful Content"
        relation: closeMatch
      - framework: mit
        target_id: "subdomain-1.2"
        target_label: "Exposure to toxic content"
        relation: closeMatch

  - id: sentiment-fairness
    type: subcategory
    broader: bias-fairness
    label: "Sentiment fairness across groups"
    definition: >
      Unequal emotional tone in system outputs across demographic
      groups, leading to perceived or actual bias in how people are
      treated or described.
    scope: LLM
    lifecycle_stages: [post-processing]
    source: HRA

  - id: performance-equity
    type: subcategory
    broader: bias-fairness
    label: "Performance equity across populations"
    alt_labels:
      - "Group-wise error rate"
    definition: >
      Higher error rates or lower accuracy for specific demographic
      groups, resulting in unfair or unequal service delivery.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]
    source: HRA
    mappings:
      - framework: mit
        target_id: "subdomain-1.3"
        target_label: "Unequal performance across groups"
        relation: closeMatch

  # ============================================================
  # 2. PRIVACY & CONFIDENTIALITY
  # ============================================================

  - id: privacy-confidentiality
    type: category
    label: "Privacy & Confidentiality"
    alt_labels:
      - "Privacy"
      - "Data Privacy"
    definition: >
      The risk that an AI system collects, processes, or infers
      personal information in ways that infringe on individuals'
      rights to control their data (privacy), or that sensitive
      information is exposed, accessed, or shared without
      authorization (confidentiality). This includes risks from data
      leakage, re-identification, unauthorized use, or insufficient
      safeguards.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing, post-processing]
    inclusion: required
    maturity: established
    mappings:
      - framework: mit
        target_id: "subdomain-2.1"
        target_label: "Compromise of privacy"
        relation: closeMatch
      - framework: nist_600
        target_id: "data-privacy"
        target_label: "Data Privacy"
        relation: closeMatch
      - framework: nist_rmf
        target_id: "privacy-enhanced"
        target_label: "Privacy-Enhanced"
        relation: closeMatch
      - framework: oecd
        target_id: "principle-1.2"
        target_label: "Human rights, rule of law, fairness & privacy"
        relation: broadMatch
      - framework: dpv_ai
        target_id: "PersonalDataHandling"
        target_label: "Personal Data Handling"
        relation: broadMatch

  - id: unlawful-data-processing
    type: subcategory
    broader: privacy-confidentiality
    label: "Unlawful collection or processing of personal data"
    definition: >
      Collection, storage, or processing of personal data without
      adequate legal basis, consent, or compliance with applicable
      data protection regulations.
    scope: ALL
    lifecycle_stages: [pre-processing]

  - id: re-identification
    type: subcategory
    broader: privacy-confidentiality
    label: "Re-identification of anonymised data"
    definition: >
      The possibility that anonymised or pseudonymised data can be
      linked back to specific individuals through inference,
      combination with other datasets, or model outputs.
    scope: ALL
    lifecycle_stages: [pre-processing, post-processing]

  - id: function-creep
    type: subcategory
    broader: privacy-confidentiality
    label: "Function creep"
    definition: >
      Repurposing of personal data beyond the original intent or
      consent scope, including secondary uses not anticipated at
      collection time.
    scope: ALL
    lifecycle_stages: [post-processing]

  - id: biometric-surveillance
    type: subcategory
    broader: privacy-confidentiality
    label: "Biometric surveillance"
    definition: >
      Mass collection and processing of biometric data (face, voice,
      gait, fingerprints) for identification or tracking purposes.
    scope: ADM
    lifecycle_stages: [post-processing]

  - id: emotion-inference-profiling
    type: subcategory
    broader: privacy-confidentiality
    label: "Emotion inference or sensitive attribute profiling"
    definition: >
      Inference of emotional states, political opinions, sexual
      orientation, health status, or other sensitive attributes from
      behavioural or interaction data.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]

  - id: weak-data-controls
    type: subcategory
    broader: privacy-confidentiality
    label: "Weak data retention, erasure, and access controls"
    definition: >
      Insufficient policies or technical measures for data retention
      limits, secure deletion, and access restrictions, increasing
      the risk of unauthorized access or indefinite data persistence.
    scope: ALL
    lifecycle_stages: [pre-processing, post-processing]

  - id: pii-leakage
    type: subcategory
    broader: privacy-confidentiality
    label: "PII leakage through model outputs"
    alt_labels:
      - "PII leakage rate"
      - "Privacy leakage"
    definition: >
      Personal data present in training data surfacing in model
      outputs, either through memorisation or through responses that
      reveal sensitive information about individuals.
    scope: LLM
    lifecycle_stages: [in-processing, post-processing]
    source: HRA

  - id: membership-inference
    type: subcategory
    broader: privacy-confidentiality
    label: "Membership inference risk"
    definition: >
      The ability to determine whether specific individuals' data was
      included in the training set, compromising privacy and
      potentially violating data protection requirements.
    scope: LLM
    lifecycle_stages: [in-processing, post-processing]
    source: HRA

  # ============================================================
  # 3. RELIABILITY
  # ============================================================

  - id: reliability
    type: category
    label: "Reliability"
    alt_labels:
      - "Reliability & Manipulation"
      - "Validity and Reliability"
    definition: >
      The risk that an AI system produces false, fabricated, or
      misleading outputs (hallucinations), spreads inaccurate or
      deceptive information (misinformation), or delivers inconsistent
      results across similar inputs and contexts. Such failures
      undermine trust, reduce system dependability, and can lead to
      harmful or misguided decisions.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing, post-processing]
    inclusion: required
    maturity: established
    mappings:
      - framework: mit
        target_id: "subdomain-7.3"
        target_label: "Lack of capability or robustness"
        relation: closeMatch
      - framework: nist_600
        target_id: "confabulation"
        target_label: "Confabulation"
        relation: closeMatch
      - framework: nist_rmf
        target_id: "valid-reliable"
        target_label: "Valid & Reliable"
        relation: closeMatch
      - framework: oecd
        target_id: "principle-1.4"
        target_label: "Robustness, security & safety"
        relation: broadMatch

  - id: hallucination
    type: subcategory
    broader: reliability
    label: "Hallucination and fabricated outputs"
    alt_labels:
      - "Confabulation"
      - "Hallucination prevention"
    definition: >
      Generation of false, fabricated, or misleading information that
      appears credible, including invented facts, statistics,
      citations, or events.
    scope: LLM
    lifecycle_stages: [post-processing]
    source: HRA
    mappings:
      - framework: nist_600
        target_id: "confabulation"
        target_label: "Confabulation"
        relation: exactMatch

  - id: output-inconsistency
    type: subcategory
    broader: reliability
    label: "Output inconsistency"
    definition: >
      Inconsistent results across similar inputs and contexts,
      undermining reproducibility and user trust.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]

  - id: output-drift
    type: subcategory
    broader: reliability
    label: "Output drift over time"
    definition: >
      Degradation of output quality or accuracy as data distributions,
      user behaviour, or operating conditions change after deployment.
    scope: ALL
    lifecycle_stages: [post-processing]

  - id: out-of-distribution-robustness
    type: subcategory
    broader: reliability
    label: "Out-of-distribution robustness"
    definition: >
      Unpredictable behaviour or failure when the system is exposed to
      inputs outside the distribution of its training data.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]
    source: HRA

  - id: failure-remediation-gaps
    type: subcategory
    broader: reliability
    label: "Failure and remediation gaps"
    alt_labels:
      - "Failures and remediations"
    definition: >
      Absence of remediation plans for predictable or unknown failure
      modes, leaving critical services unable to recover or degrade
      gracefully.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  - id: monitoring-evaluation-gaps
    type: subcategory
    broader: reliability
    label: "Monitoring and evaluation gaps"
    alt_labels:
      - "Monitoring, feedback, evaluation"
    definition: >
      Lack of ongoing monitoring that renders datasets obsolete and
      system outputs unreliable, including absence of feedback
      mechanisms and periodic evaluation.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  # ============================================================
  # 4. GOVERNANCE
  # ============================================================

  - id: governance
    type: category
    label: "Governance"
    alt_labels:
      - "Accountability"
      - "Governance & Accountability"
    definition: >
      The risk that an AI system lacks adequate structures, policies,
      or accountability mechanisms to oversee its design, deployment,
      and use. Weak governance can lead to unclear responsibilities,
      poor documentation, limited auditability, and failure to align
      with legal, ethical, or organizational standards.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing, post-processing]
    inclusion: required
    maturity: established
    mappings:
      - framework: mit
        target_id: "subdomain-6.5"
        target_label: "Governance failure"
        relation: closeMatch
      - framework: nist_600
        target_id: "value-chain"
        target_label: "Value Chain & Component Integration"
        relation: relatedMatch
      - framework: nist_rmf
        target_id: "accountable-transparent"
        target_label: "Accountable & Transparent"
        relation: closeMatch
      - framework: oecd
        target_id: "principle-1.5"
        target_label: "Accountability"
        relation: closeMatch
      - framework: iso_42001
        target_id: "A.2-A.4"
        target_label: "AI Policy, Internal Organisation, Resources"
        relation: broadMatch

  - id: unclear-responsibilities
    type: subcategory
    broader: governance
    label: "Unclear responsibilities and accountability gaps"
    definition: >
      Missing or ambiguous assignment of roles and responsibilities
      for AI system design, deployment, monitoring, and incident
      response.
    scope: ALL
    lifecycle_stages: [pre-processing, post-processing]

  - id: poor-documentation
    type: subcategory
    broader: governance
    label: "Poor documentation"
    definition: >
      Incomplete, outdated, or absent documentation of system
      purpose, architecture, data sources, known limitations, and
      operational procedures.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing, post-processing]

  - id: limited-auditability
    type: subcategory
    broader: governance
    label: "Limited auditability"
    definition: >
      Insufficient logging, versioning, or traceability for
      meaningful external review or internal audit.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]

  - id: regulatory-non-compliance
    type: subcategory
    broader: governance
    label: "Regulatory non-compliance"
    definition: >
      Failure to align with applicable legal, ethical, or
      organisational standards, including sector-specific regulations.
    scope: ALL
    lifecycle_stages: [pre-processing, post-processing]

  - id: lack-of-change-management
    type: subcategory
    broader: governance
    label: "Lack of change management"
    definition: >
      Absence of controlled processes for system modifications,
      including uncontrolled changes to production systems.
    scope: ALL
    lifecycle_stages: [post-processing]

  - id: oversight-of-adverse-impacts
    type: subcategory
    broader: governance
    label: "Oversight of significant adverse impacts"
    definition: >
      Missing processes for identifying, escalating, and responding
      to harmful outcomes, including psychological or physical harm
      and threats to human life.
    scope: ALL
    lifecycle_stages: [pre-processing, post-processing]
    source: HRA

  - id: fitness-for-purpose
    type: subcategory
    broader: governance
    label: "Fitness for purpose"
    definition: >
      System not validated against the problem it is intended to
      solve, leading to incorrect outputs or failure to deliver
      expected results.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing]
    source: HRA

  - id: data-governance
    type: subcategory
    broader: governance
    label: "Data governance"
    definition: >
      Inadequate labelling, tagging, approval, or appropriateness
      assessment of data, leading to downstream issues with fitness
      for purpose, bias, and compliance.
    scope: ALL
    lifecycle_stages: [pre-processing]
    source: HRA

  - id: human-oversight-control
    type: subcategory
    broader: governance
    label: "Human oversight and control"
    definition: >
      Lack of defined intervention points, override capabilities, or
      human review mechanisms, allowing issues and threats to persist
      unchecked.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  - id: decision-traceability
    type: subcategory
    broader: governance
    label: "Decision traceability"
    definition: >
      Inability to trace decisions made or influenced by the AI
      system back to specific inputs, processes, or actors, making
      it impossible to investigate harms or assign responsibility.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]
    source: HRA

  - id: input-output-logging
    type: subcategory
    broader: governance
    label: "Critical input/output logging"
    definition: >
      Failure to log inputs and outputs systematically, hindering
      detection of failures, bias, or misuse. For LLMs, unlogged
      prompts may prevent tracking of harmful or sensitive
      interactions.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  - id: responsible-actor-attribution
    type: subcategory
    broader: governance
    label: "Responsible actor attribution"
    definition: >
      Unclear or undocumented roles of developers, deployers, or
      reviewers, creating accountability gaps that can delay
      incident response or allow harmful practices to persist.
    scope: ALL
    lifecycle_stages: [pre-processing, post-processing]
    source: HRA

  - id: task-success
    type: subcategory
    broader: governance
    label: "Task success"
    definition: >
      Low or uneven task success rates, particularly across
      subpopulations or input types, leading to systematic exclusion,
      service denial, or misinformation.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  # ============================================================
  # 5. SECURITY & MISUSE
  # ============================================================

  - id: security-misuse
    type: category
    label: "Security & Misuse"
    alt_labels:
      - "Safety, Security & Misuse"
      - "Security"
      - "Safety"
    definition: >
      The risk that an AI system is exposed to vulnerabilities,
      attacks, or misuse that compromise its integrity, availability,
      or confidentiality. This includes adversarial inputs, model
      inversion, data poisoning, prompt injection, and unauthorized
      access, which can lead to manipulation of outputs, data
      breaches, or system failure.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing, post-processing]
    inclusion: required
    maturity: established
    mappings:
      - framework: mit
        target_id: "subdomain-2.2"
        target_label: "AI system security vulnerabilities & attacks"
        relation: closeMatch
      - framework: mit
        target_id: "domain-4"
        target_label: "Malicious Actors & Misuse"
        relation: closeMatch
      - framework: nist_600
        target_id: "information-security"
        target_label: "Information Security"
        relation: closeMatch
      - framework: nist_rmf
        target_id: "secure-resilient"
        target_label: "Secure & Resilient"
        relation: closeMatch
      - framework: oecd
        target_id: "principle-1.4"
        target_label: "Robustness, security & safety"
        relation: broadMatch
      - framework: dpv_ai
        target_id: "SecurityAttack"
        target_label: "Security Attack"
        relation: broadMatch

  - id: adversarial-attacks
    type: subcategory
    broader: security-misuse
    label: "Adversarial attacks"
    definition: >
      Evasion, poisoning, and extraction attacks designed to
      manipulate system behaviour, corrupt training data, or steal
      model information.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]

  - id: prompt-injection
    type: subcategory
    broader: security-misuse
    label: "Prompt injection"
    alt_labels:
      - "Prompt injection protection"
    definition: >
      Malicious inputs designed to subvert system intent by injecting
      instructions that override the system prompt, leading to
      harmful, deceptive, or unauthorized outputs.
    scope: LLM
    lifecycle_stages: [post-processing]
    source: HRA
    mappings:
      - framework: dpv_ai
        target_id: "PromptInjection"
        target_label: "Prompt Injection"
        relation: exactMatch

  - id: jailbreaking
    type: subcategory
    broader: security-misuse
    label: "Jailbreaking"
    alt_labels:
      - "Jailbreakability"
    definition: >
      Techniques used to bypass safety controls, content filters, or
      usage restrictions to trigger prohibited behaviours or outputs.
    scope: LLM
    lifecycle_stages: [post-processing]
    source: HRA

  - id: unauthorized-access
    type: subcategory
    broader: security-misuse
    label: "Unauthorized access"
    definition: >
      Exploitation of access control weaknesses to gain unauthorized
      access to the system, its data, or its administrative functions.
    scope: ALL
    lifecycle_stages: [post-processing]

  - id: supply-chain-vulnerabilities
    type: subcategory
    broader: security-misuse
    label: "Supply-chain vulnerabilities"
    definition: >
      Risks introduced through third-party components, pre-trained
      models, data sources, or other dependencies not fully under
      the deployer's control.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing]

  - id: incident-response-gaps
    type: subcategory
    broader: security-misuse
    label: "Incident response gaps"
    definition: >
      Insufficient detection, logging, escalation, or response
      capabilities for security incidents and misuse events.
    scope: ALL
    lifecycle_stages: [post-processing]

  - id: misuse-beyond-intended-purpose
    type: subcategory
    broader: security-misuse
    label: "Misuse beyond intended purpose"
    definition: >
      Use of the system for purposes it was not designed for,
      including repurposing for surveillance, manipulation, or other
      harmful applications.
    scope: ALL
    lifecycle_stages: [post-processing]

  # ============================================================
  # 6. ENVIRONMENTAL IMPACT
  # ============================================================

  - id: environmental-impact
    type: category
    label: "Environmental Impact"
    alt_labels:
      - "Sustainability"
      - "Environmental sustainability"
    definition: >
      The risk that an AI system's development, deployment, or use
      causes negative environmental effects, such as excessive energy
      or water consumption, carbon emissions, or unsustainable use of
      hardware and resources. This includes hidden impacts across the
      system's lifecycle, from model training to long-term operation.
    scope: ALL
    lifecycle_stages: [pre-processing, in-processing, post-processing]
    inclusion: audit-dependent
    maturity: established
    mappings:
      - framework: mit
        target_id: "subdomain-6.6"
        target_label: "Environmental harm"
        relation: closeMatch
      - framework: nist_600
        target_id: "environmental"
        target_label: "Environmental Impacts"
        relation: closeMatch
      - framework: oecd
        target_id: "principle-1.1"
        target_label: "Inclusive growth, sustainable development & well-being"
        relation: broadMatch

  - id: inference-energy-consumption
    type: subcategory
    broader: environmental-impact
    label: "Inference-time energy consumption"
    definition: >
      High energy use during deployment and inference, increasing
      environmental impact and infrastructure costs.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  - id: training-resource-consumption
    type: subcategory
    broader: environmental-impact
    label: "Training resource consumption"
    definition: >
      Significant carbon emissions, energy use, and water consumption
      associated with model training, particularly for large-scale
      foundation models.
    scope: ALL
    lifecycle_stages: [in-processing]
    source: HRA

  - id: hardware-efficiency
    type: subcategory
    broader: environmental-impact
    label: "Hardware efficiency"
    definition: >
      Poor hardware utilisation increasing costs, environmental
      footprint, and limiting the feasibility of equitable access
      to AI capabilities.
    scope: ALL
    lifecycle_stages: [in-processing, post-processing]
    source: HRA

  # ============================================================
  # 7. TRANSPARENCY & EXPLAINABILITY
  # ============================================================

  - id: transparency-explainability
    type: category
    label: "Transparency & Explainability"
    alt_labels:
      - "Explainability & Transparency"
      - "Transparency and Explainability"
    definition: >
      The risk that stakeholders cannot understand how an AI system
      works, what it does, or why it produces specific outputs. Lack
      of transparency undermines informed consent, impedes oversight,
      and erodes trust.
    scope: ALL
    lifecycle_stages: [post-processing]
    inclusion: required
    maturity: established
    note: >
      In the RAIA Guide, this category is assessed only at the
      Post-Processing stage.
    mappings:
      - framework: mit
        target_id: "subdomain-7.4"
        target_label: "Lack of transparency or interpretability"
        relation: closeMatch
      - framework: nist_rmf
        target_id: "explainable-interpretable"
        target_label: "Explainable & Interpretable"
        relation: closeMatch
      - framework: oecd
        target_id: "principle-1.3"
        target_label: "Transparency & explainability"
        relation: closeMatch
      - framework: dpv_ai
        target_id: "Transparency"
        target_label: "Transparency"
        relation: broadMatch

  - id: system-explainability
    type: subcategory
    broader: transparency-explainability
    label: "AI system explainability"
    definition: >
      Stakeholders misinterpret or misunderstand the intended purpose
      or use of an AI system based on its outputs, due to insufficient
      explanation of how outputs are produced.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  - id: stakeholder-communication
    type: subcategory
    broader: transparency-explainability
    label: "Communication to stakeholders"
    alt_labels:
      - "Communication to relevant interested parties"
    definition: >
      Stakeholders not being made aware of AI system limitations,
      parameters, and settings that affect responsible use.
    scope: ALL
    lifecycle_stages: [post-processing]
    source: HRA

  - id: ai-interaction-disclosure
    type: subcategory
    broader: transparency-explainability
    label: "Disclosure of AI interaction"
    definition: >
      Users interacting with an AI system under the assumption that
      they are communicating with a human, without clear disclosure.
    scope: LLM
    lifecycle_stages: [post-processing]
    source: HRA

  - id: model-card-completeness
    type: subcategory
    broader: transparency-explainability
    label: "Model card completeness"
    definition: >
      Incomplete or outdated documentation of model purpose,
      performance, limitations, or data sources, leading to
      inappropriate deployment or overestimation of capabilities.
    scope: ALL
    lifecycle_stages: [pre-processing, post-processing]
    source: HRA

  - id: prompt-transparency
    type: subcategory
    broader: transparency-explainability
    label: "Prompt transparency"
    definition: >
      Inconsistent outputs to semantically similar inputs that
      confuse users and erode trust. For LLMs, variation across
      generations may lead to contradictory advice or conflicting
      factual claims.
    scope: LLM
    lifecycle_stages: [post-processing]
    source: HRA

  # ============================================================
  # 8. RESPONSIBILITY & REDRESS
  # ============================================================

  - id: responsibility-redress
    type: category
    label: "Responsibility & Redress"
    definition: >
      The risk that individuals affected by AI-driven decisions have
      no effective means to understand, challenge, or seek remedy for
      those decisions. This includes absence of appeal mechanisms,
      unclear remediation procedures, and failure to communicate with
      affected parties.
    scope: ALL
    lifecycle_stages: [post-processing]
    inclusion: audit-dependent
    maturity: developing
    note: >
      In the RAIA Guide, this category is assessed only at the
      Post-Processing stage.
    mappings:
      - framework: nist_rmf
        target_id: "accountable-transparent"
        target_label: "Accountable & Transparent"
        relation: broadMatch
      - framework: oecd
        target_id: "principle-1.5"
        target_label: "Accountability"
        relation: broadMatch

  - id: absence-of-appeal
    type: subcategory
    broader: responsibility-redress
    label: "Absence of appeal mechanisms"
    definition: >
      No accessible process for individuals to challenge or appeal
      AI-driven decisions that affect them.
    scope: ALL
    lifecycle_stages: [post-processing]

  - id: unclear-remediation
    type: subcategory
    broader: responsibility-redress
    label: "Unclear remediation procedures"
    definition: >
      Absence of defined processes for correcting harms caused by AI
      system errors or failures.
    scope: ALL
    lifecycle_stages: [post-processing]

  - id: ineffective-communication
    type: subcategory
    broader: responsibility-redress
    label: "Ineffective communication with affected parties"
    definition: >
      Failure to inform individuals about how they have been affected
      by AI-driven decisions and what options are available to them.
    scope: ALL
    lifecycle_stages: [post-processing]

  # ============================================================
  # 9. AUTONOMY & HUMAN AGENCY (emerging)
  # ============================================================

  - id: autonomy
    type: category
    label: "Autonomy & Human Agency"
    alt_labels:
      - "Human Autonomy"
    definition: >
      The risk that an AI system undermines individuals' ability to
      make free, informed decisions, whether through over-reliance,
      automation bias, manipulative design, or erosion of human
      agency.
    scope: ALL
    lifecycle_stages: [post-processing]
    inclusion: audit-dependent
    maturity: provisional
    mappings:
      - framework: mit
        target_id: "subdomain-5.2"
        target_label: "Loss of human agency & autonomy"
        relation: closeMatch
      - framework: nist_600
        target_id: "human-ai-configuration"
        target_label: "Human-AI Configuration"
        relation: closeMatch

  # ============================================================
  # 10. AGENTIC RISKS (emerging)
  # ============================================================

  - id: agentic-risks
    type: category
    label: "Agentic Risks"
    definition: >
      The risk that AI systems operating with a degree of autonomy —
      planning, executing multi-step actions, using tools, or
      coordinating with other AI agents — introduce failure modes not
      present in single-inference systems. This includes cascading
      errors across agent chains, unintended emergent behaviour, and
      loss of meaningful human control over compound actions.
    scope: LLM
    lifecycle_stages: [post-processing]
    inclusion: audit-dependent
    maturity: provisional
    mappings:
      - framework: mit
        target_id: "subdomain-7.6"
        target_label: "Multi-agent risks"
        relation: closeMatch

  # ============================================================
  # 11. MANIPULATION & MISINFORMATION (emerging)
  # ============================================================

  - id: manipulation-misinformation
    type: category
    label: "Manipulation & Misinformation"
    definition: >
      The risk that AI systems are used — intentionally or through
      design flaws — to deceive, manipulate, or mislead individuals
      or populations. This includes generation of disinformation at
      scale, deepfakes, subliminal manipulation, and pollution of
      the information ecosystem.
    scope: ALL
    lifecycle_stages: [post-processing]
    inclusion: audit-dependent
    maturity: provisional
    mappings:
      - framework: mit
        target_id: "domain-3"
        target_label: "Misinformation"
        relation: closeMatch
      - framework: nist_600
        target_id: "information-integrity"
        target_label: "Information Integrity"
        relation: closeMatch
