concepts:
- id: bias-fairness
  type: category
  label: Bias & Fairness
  alt_labels:
  - Fairness
  - Bias & Discrimination
  - Algorithmic fairness
  definition: 'The risk that an AI system produces outcomes that systematically advantage or disadvantage individuals or groups
    based on protected or sensitive attributes, leading to unequal treatment, reduced accuracy, or unjust impacts. This includes
    biases introduced through data, model design, or deployment context, and covers both measurable disparities and perceived
    unfairness in decision-making.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: rights & ethics
  mappings:
  - framework: mit
    target_id: domain-1
    target_label: Discrimination & Toxicity
    relation: closeMatch
  - framework: nist_600
    target_id: harmful-bias
    target_label: Harmful Bias & Homogenization
    relation: closeMatch
  - framework: nist_rmf
    target_id: fair
    target_label: Fair with Harmful Bias Managed
    relation: closeMatch
  - framework: oecd
    target_id: principle-1.2
    target_label: Human rights, rule of law, fairness & privacy
    relation: broadMatch
  - framework: dpv_ai
    target_id: AIBias
    target_label: AI Bias
    relation: broadMatch
  - framework: iso_42001
    target_id: A.8
    target_label: Assessing impacts of AI systems
    relation: relatedMatch
- id: bias-data-representation
  type: subgroup
  broader: bias-fairness
  label: Data & representation
  definition: Risks arising from how data is collected, composed, and represented in training and evaluation datasets.
  mappings:
  - framework: mit
    target_id: subdomain-1.1
    target_label: Unfair discrimination and misrepresentation
    relation: closeMatch
  - framework: dpv_ai
    target_id: DataBias
    target_label: Data Bias
    target_url: https://w3c.github.io/dpv/2.3/ai/#DataBias
    relation: closeMatch
  status: retired
  retirement_note: Replaced by new sub-group structure in v0.3 (Outcome disparities, Representational harm, Dynamic & Systemic
    bias).
- id: dataset-bias
  type: subcategory
  broader: bias-data-representation
  maturity: established
  label: Dataset bias and under/over-representation
  definition: 'Training or evaluation data that does not adequately represent all relevant population groups, leading to systematic
    performance differences or exclusion of certain groups.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  mappings:
  - framework: mit
    target_id: subdomain-1.1
    target_label: Unfair discrimination & misrepresentation
    relation: closeMatch
  status: retired
  retirement_note: Reframed in v0.3 as a mechanism (operationalisation), not a risk in itself. Now appears as operationalisation
    under Differential performance across populations.
- id: proxy-discrimination
  type: subcategory
  broader: bias-data-representation
  maturity: established
  label: Proxy discrimination through correlated features
  definition: 'Discrimination through features that correlate with protected attributes (e.g., postcode as proxy for ethnicity),
    even when protected attributes are not directly used.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  status: retired
  retirement_note: Reframed in v0.3 as a mechanism (operationalisation), not a risk in itself. Now appears as operationalisation
    under Differential performance across populations.
- id: geographic-cultural-language-skew
  type: subcategory
  broader: bias-representational-harm
  maturity: established
  label: Geographic, cultural, or language skew
  definition: 'Systematic performance differences across geographies, cultures, or languages, often resulting from training
    data that overrepresents certain regions or linguistic traditions.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
- id: feedback-loops
  type: subcategory
  broader: bias-dynamic-systemic-bias
  maturity: established
  label: Feedback loops reinforcing inequality
  definition: 'System outputs that, when fed back into the system or its operational context, amplify existing biases over
    time.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: bias-output-quality
  type: subgroup
  broader: bias-fairness
  label: Output quality across groups
  definition: Risks related to harmful, demeaning, or unfair content in system outputs.
  mappings:
  - framework: mit
    target_id: subdomain-1.2
    target_label: Exposure to toxic content
    relation: closeMatch
  - framework: nist_600
    target_id: '5'
    target_label: Dangerous, Violent, or Hateful Content
    relation: relatedMatch
  status: retired
  retirement_note: Replaced by new sub-group structure in v0.3 (Outcome disparities, Representational harm, Dynamic & Systemic
    bias).
- id: stereotyping-demeaning-content
  type: subcategory
  broader: bias-representational-harm
  maturity: emerging
  label: Stereotyping and demeaning content
  alt_labels:
  - Minimization of stereotyping
  definition: 'AI system outputs that reinforce, perpetuate, erase, or demean demographic groups through stereotypical representations
    or language.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  source: HRA
  mappings:
  - framework: mit
    target_id: subdomain-1.1
    target_label: Unfair discrimination & misrepresentation
    relation: closeMatch
- id: harmful-content-toxicity
  type: subcategory
  broader: bias-representational-harm
  maturity: emerging
  label: Harmful content and toxicity
  alt_labels:
  - Toxicity
  - Harmful content prevention
  definition: 'Offensive, hateful, or otherwise harmful outputs that damage user well-being and erode trust.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
  source: HRA
  mappings:
  - framework: nist_600
    target_id: dangerous-content
    target_label: Dangerous, Violent, or Hateful Content
    relation: closeMatch
  - framework: mit
    target_id: subdomain-1.2
    target_label: Exposure to toxic content
    relation: closeMatch
- id: sentiment-fairness
  type: subcategory
  broader: bias-representational-harm
  maturity: emerging
  label: Sentiment and quality disparity across groups
  definition: The system produces outputs of systematically different tone, sentiment, or quality when describing or addressing
    different demographic groups — for example, more negative, more dismissive, or less detailed responses for certain populations.
  scope: LLM
  lifecycle_stages:
  - post-processing
  source: HRA
  alt_labels:
  - Sentiment fairness across groups
- id: bias-performance-disparities
  type: subgroup
  broader: bias-fairness
  label: Performance disparities
  definition: Risks related to unequal system performance, access, or outcomes across population groups.
  mappings:
  - framework: mit
    target_id: subdomain-1.3
    target_label: Unequal performance across groups
    relation: closeMatch
  - framework: nist_rmf
    target_id: fair
    target_label: Fair with Harmful Bias Managed
    relation: closeMatch
  status: retired
  retirement_note: Replaced by new sub-group structure in v0.3 (Outcome disparities, Representational harm, Dynamic & Systemic
    bias).
- id: intersectional-unfairness
  type: subcategory
  broader: bias-performance-disparities
  maturity: established
  label: Intersectional unfairness
  definition: 'Compounded disadvantage affecting individuals at the intersection of multiple protected characteristics (e.g.,
    gender and ethnicity together producing worse outcomes than either alone).

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  status: retired
  retirement_note: Absorbed into "Disparate impact on protected groups" in v0.3.
- id: accessibility-barriers
  type: subcategory
  broader: bias-performance-disparities
  maturity: established
  label: Accessibility barriers
  definition: 'System design that excludes or disadvantages people with disabilities, including inaccessible interfaces, outputs,
    or interaction modes.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
  status: retired
  retirement_note: Absorbed into "Disparate impact on protected groups" in v0.3.
- id: quality-of-service-disparity
  type: subcategory
  broader: bias-performance-disparities
  maturity: emerging
  label: Quality of service disparity across groups
  alt_labels:
  - Quality of service
  definition: 'Inconsistent service quality across demographic groups, leading to systematically better performance for some
    groups over others.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  source: HRA
  status: retired
  retirement_note: Absorbed into "Disparate impact on protected groups" in v0.3.
- id: allocation-of-opportunity
  type: subcategory
  broader: bias-performance-disparities
  maturity: emerging
  label: Unequal allocation of opportunity
  alt_labels:
  - Allocation of opportunity
  definition: 'AI system outputs that lead to the uneven allocation of opportunities (e.g., jobs, credit, services) across
    demographic groups.

    '
  scope: ADM
  lifecycle_stages:
  - post-processing
  source: HRA
  status: retired
  retirement_note: Absorbed into "Disparate impact on protected groups" in v0.3.
- id: performance-equity
  type: subcategory
  broader: bias-outcome-disparities
  maturity: emerging
  label: Differential performance across populations
  alt_labels:
  - Group-wise error rate
  - Performance equity across populations
  definition: The AI system performs systematically worse for some demographic groups than others — through higher error rates,
    lower accuracy, or reduced reliability — leading to unequal quality of service even when access is the same.
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  source: HRA
  mappings:
  - framework: mit
    target_id: subdomain-1.3
    target_label: Unequal performance across groups
    relation: closeMatch
  operationalisation:
  - id: dataset-bias
    label: Dataset bias and under/over-representation
    description: Training or evaluation data that does not adequately represent all relevant population groups, leading to
      systematic performance differences or exclusion of certain groups.
  - id: proxy-discrimination
    label: Proxy discrimination through correlated features
    description: Discrimination through features that correlate with protected attributes (e.g., postcode as proxy for ethnicity),
      even when protected attributes are not directly used.
- id: bias-outcome-disparities
  type: subgroup
  broader: bias-fairness
  label: Outcome disparities
  definition: Risks related to unequal treatment, allocation, or performance outcomes across demographic and protected groups.
    These are observable differences in what the system does to or for different groups.
- id: disparate-impact-protected-groups
  type: subcategory
  broader: bias-outcome-disparities
  maturity: established
  label: Disparate impact on protected groups
  definition: The system produces systematically different — typically worse — outcomes for individuals belonging to protected
    groups, including across multiple intersecting attributes (race, gender, age, disability, etc.). Encompasses unequal allocation
    of opportunity, quality of service disparities, intersectional unfairness, and accessibility barriers.
  scope: ALL
  lifecycle_stages:
  - post-processing
  alt_labels:
  - Disparate impact
  - Quality of service disparity
  - Allocation of opportunity
  - Intersectional unfairness
  - Accessibility barriers
  operationalisation:
  - id: intersectional-unfairness
    label: Intersectional unfairness
    description: Compounded disadvantage affecting individuals at the intersection of multiple protected characteristics (e.g.,
      gender and ethnicity together producing worse outcomes than either alone).
  - id: accessibility-barriers
    label: Accessibility barriers
    description: System design that excludes or disadvantages people with disabilities, including inaccessible interfaces,
      outputs, or interaction modes.
  - id: quality-of-service-disparity
    label: Quality of service disparity across groups
    description: Inconsistent service quality across demographic groups, leading to systematically better performance for
      some groups over others.
  - id: allocation-of-opportunity
    label: Unequal allocation of opportunity
    description: AI system outputs that lead to the uneven allocation of opportunities (e.g., jobs, credit, services) across
      demographic groups.
- id: bias-representational-harm
  type: subgroup
  broader: bias-fairness
  label: Representational harm
  definition: Risks related to how the system represents groups in its outputs — through stereotypes, toxic content, skewed
    representation, or homogenization. These are harms in the form of meaning and content rather than allocation of resources
    or opportunities.
- id: homogenization-output-across-groups
  type: subcategory
  broader: bias-representational-harm
  maturity: emerging
  label: Homogenization of output across groups
  definition: The system produces outputs that flatten cultural, linguistic, or stylistic diversity, defaulting to dominant
    patterns and erasing distinctive characteristics of underrepresented groups. Particularly relevant for generative AI,
    where homogenization in text, image, or speech outputs can reinforce hegemonic norms.
  scope: LLM
  lifecycle_stages:
  - post-processing
- id: bias-dynamic-systemic-bias
  type: subgroup
  broader: bias-fairness
  label: Dynamic & Systemic bias
  definition: Risks related to how bias is amplified or perpetuated over time through interaction between AI systems and the
    social systems they operate in.
- id: privacy-confidentiality
  type: category
  label: Privacy & Confidentiality
  alt_labels:
  - Privacy
  - Data Privacy
  definition: 'The risk that an AI system collects, processes, or infers personal information in ways that infringe on individuals''
    rights to control their data (privacy), or that sensitive information is exposed, accessed, or shared without authorization
    (confidentiality). This includes risks from data leakage, re-identification, unauthorized use, or insufficient safeguards.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: rights & ethics
  mappings:
  - framework: mit
    target_id: subdomain-2.1
    target_label: Compromise of privacy
    relation: closeMatch
  - framework: nist_600
    target_id: data-privacy
    target_label: Data Privacy
    relation: closeMatch
  - framework: nist_rmf
    target_id: privacy-enhanced
    target_label: Privacy-Enhanced
    relation: closeMatch
  - framework: oecd
    target_id: principle-1.2
    target_label: Human rights, rule of law, fairness & privacy
    relation: broadMatch
  - framework: dpv_ai
    target_id: PersonalDataHandling
    target_label: Personal Data Handling
    relation: broadMatch
- id: privacy-collection-use
  type: subgroup
  broader: privacy-confidentiality
  label: Data collection & use
  definition: Risks from how personal data is collected, processed, and repurposed.
  mappings:
  - framework: dpv_ai
    target_id: PersonalDataCollection
    target_label: Personal Data Handling
    target_url: https://w3c.github.io/dpv/2.3/ai/#PersonalDataHandling
    relation: closeMatch
  - framework: eu_ai_act
    target_id: article-5
    target_label: Article 5 — Prohibited AI practices (emotion recognition, biometric categorization)
    relation: relatedMatch
- id: unlawful-data-processing
  type: subcategory
  broader: privacy-collection-use
  maturity: established
  label: Unlawful collection or processing of personal data
  definition: 'Collection, storage, or processing of personal data without adequate legal basis, consent, or compliance with
    applicable data protection regulations.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
- id: function-creep
  type: subcategory
  broader: privacy-collection-use
  maturity: established
  label: Function creep
  definition: 'Repurposing of personal data beyond the original intent or consent scope, including secondary uses not anticipated
    at collection time.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: biometric-surveillance
  type: subcategory
  broader: privacy-collection-use
  maturity: established
  label: Biometric surveillance
  definition: 'Mass collection and processing of biometric data (face, voice, gait, fingerprints) for identification or tracking
    purposes.

    '
  scope: ADM
  lifecycle_stages:
  - post-processing
- id: emotion-inference-profiling
  type: subcategory
  broader: privacy-collection-use
  maturity: established
  label: Emotion inference or sensitive attribute profiling
  definition: 'Inference of emotional states, political opinions, sexual orientation, health status, or other sensitive attributes
    from behavioural or interaction data.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
- id: privacy-data-protection
  type: subgroup
  broader: privacy-confidentiality
  label: Data protection
  definition: Risks related to safeguards for stored and processed personal data.
  mappings:
  - framework: nist_600
    target_id: '4'
    target_label: Data Privacy
    relation: closeMatch
  - framework: iso_42001
    target_id: A.7
    target_label: Data management
    relation: relatedMatch
- id: weak-data-controls
  type: subcategory
  broader: privacy-data-protection
  maturity: established
  label: Weak data retention, erasure, and access controls
  definition: 'Insufficient policies or technical measures for data retention limits, secure deletion, and access restrictions,
    increasing the risk of unauthorized access or indefinite data persistence.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
- id: re-identification
  type: subcategory
  broader: privacy-data-protection
  maturity: established
  label: Re-identification of anonymised data
  definition: 'The possibility that anonymised or pseudonymised data can be linked back to specific individuals through inference,
    combination with other datasets, or model outputs.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
- id: privacy-model-level
  type: subgroup
  broader: privacy-confidentiality
  label: Model-level privacy
  definition: Risks from AI models leaking or exposing private information through their outputs or structure.
  mappings:
  - framework: mit
    target_id: subdomain-2.1
    target_label: Compromise of privacy by obtaining, leaking or inferring sensitive information
    relation: closeMatch
  - framework: dpv_ai
    target_id: MembershipInferenceAttack
    target_label: Membership Inference Attack
    target_url: https://w3c.github.io/dpv/2.3/ai/#MembershipInferenceAttack
    relation: closeMatch
  references:
  - label: OpenAI Privacy Filter
    url: https://github.com/openai/privacy-filter
    type: tool
    note: Open-source tool for detecting and filtering personally identifiable information in LLM inputs and outputs.
- id: pii-leakage
  type: subcategory
  broader: privacy-model-level
  maturity: established
  label: PII leakage through model outputs
  alt_labels:
  - PII leakage rate
  - Privacy leakage
  definition: 'Personal data present in training data surfacing in model outputs, either through memorisation or through responses
    that reveal sensitive information about individuals.

    '
  scope: LLM
  lifecycle_stages:
  - in-processing
  - post-processing
  source: HRA
- id: membership-inference
  type: subcategory
  broader: privacy-model-level
  maturity: emerging
  label: Membership inference risk
  definition: 'The ability to determine whether specific individuals'' data was included in the training set, compromising
    privacy and potentially violating data protection requirements.

    '
  scope: LLM
  lifecycle_stages:
  - in-processing
  - post-processing
  source: HRA
- id: reliability
  type: category
  label: Reliability
  alt_labels:
  - Reliability & Manipulation
  - Validity and Reliability
  definition: 'The risk that an AI system produces false, fabricated, or misleading outputs (hallucinations), spreads inaccurate
    or deceptive information (misinformation), or delivers inconsistent results across similar inputs and contexts. Such failures
    undermine trust, reduce system dependability, and can lead to harmful or misguided decisions.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: technical soundness
  mappings:
  - framework: mit
    target_id: subdomain-7.3
    target_label: Lack of capability or robustness
    relation: closeMatch
  - framework: mit
    target_id: domain-3
    target_label: Misinformation
    relation: broadMatch
  - framework: nist_600
    target_id: '2'
    target_label: Confabulation
    relation: closeMatch
  - framework: nist_600
    target_id: '8'
    target_label: Information Integrity
    relation: broadMatch
  - framework: nist_rmf
    target_id: valid-reliable
    target_label: Valid & Reliable
    relation: closeMatch
  - framework: oecd
    target_id: robustness
    target_label: Robustness, security & safety
    relation: broadMatch
  references:
  - label: HealthBench Professional (OpenAI, 2025)
    url: https://cdn.openai.com/dd128428-0184-4e25-b155-3a7686c7d744/HealthBench-Professional.pdf
    type: benchmark
    domain: healthcare
    note: Benchmark for evaluating LLM reliability and accuracy in professional healthcare contexts. Useful when auditing
      AI systems deployed in health domains.
- id: reliability-output-quality
  type: subgroup
  broader: reliability
  label: Output quality
  definition: Risks related to the correctness, consistency, and robustness of system outputs.
  mappings:
  - framework: nist_600
    target_id: '2'
    target_label: Confabulation
    relation: closeMatch
  - framework: nist_rmf
    target_id: valid-reliable
    target_label: Valid & Reliable
    relation: closeMatch
- id: hallucination
  type: subcategory
  broader: reliability-output-quality
  maturity: established
  label: Hallucination and fabricated outputs
  alt_labels:
  - Confabulation
  - Hallucination prevention
  definition: 'Generation of false, fabricated, or misleading information that appears credible, including invented facts,
    statistics, citations, or events.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
  source: HRA
  mappings:
  - framework: nist_600
    target_id: confabulation
    target_label: Confabulation
    relation: exactMatch
- id: output-inconsistency
  type: subcategory
  broader: reliability-output-quality
  maturity: established
  label: Output inconsistency
  definition: 'Inconsistent results across similar inputs and contexts, undermining reproducibility and user trust.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
- id: output-drift
  type: subcategory
  broader: reliability-output-quality
  maturity: established
  label: Output drift over time
  definition: 'Degradation of output quality or accuracy as data distributions, user behaviour, or operating conditions change
    after deployment.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: out-of-distribution-robustness
  type: subcategory
  broader: reliability-output-quality
  maturity: emerging
  label: Out-of-distribution robustness
  definition: 'Unpredictable behaviour or failure when the system is exposed to inputs outside the distribution of its training
    data.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  source: HRA
- id: reliability-monitoring
  type: subgroup
  broader: reliability
  label: Monitoring & remediation
  definition: Risks from inadequate monitoring, evaluation, and failure response.
  mappings:
  - framework: nist_rmf
    target_id: measure-function
    target_label: MEASURE function
    relation: broadMatch
  - framework: iso_42001
    target_id: A.6.2.4
    target_label: AI system verification and validation
    relation: relatedMatch
  status: retired
  retirement_note: Dissolved in v0.3. failure-remediation-gaps and monitoring-evaluation-gaps moved to Governance / Compliance
    & process — these are governance processes, not technical reliability properties.
- id: failure-remediation-gaps
  type: subcategory
  broader: governance-compliance
  maturity: emerging
  label: Failure and remediation gaps
  alt_labels:
  - Failures and remediations
  - Unclear remediation procedures
  definition: 'Absence of remediation plans for predictable or unknown failure modes, leaving critical services unable to
    recover or degrade gracefully.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  source: HRA
  operationalisation:
  - id: unclear-remediation
    label: Unclear remediation procedures
    description: Absence of defined processes for correcting harms caused by AI system errors or failures.
- id: monitoring-evaluation-gaps
  type: subcategory
  broader: governance-compliance
  maturity: emerging
  label: Monitoring and evaluation gaps
  alt_labels:
  - Monitoring, feedback, evaluation
  definition: 'Lack of ongoing monitoring that renders datasets obsolete and system outputs unreliable, including absence
    of feedback mechanisms and periodic evaluation.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  source: HRA
- id: reliability-manipulation
  type: subgroup
  broader: reliability
  label: Manipulation & misinformation
  definition: Risks that the system produces or facilitates deceptive, manipulative, or misleading content, whether through
    design flaws or intentional misuse.
  maturity: emerging
  mappings:
  - framework: mit
    target_id: domain-3
    target_label: Misinformation
    relation: closeMatch
  - framework: nist_600
    target_id: '8'
    target_label: Information Integrity
    relation: closeMatch
  - framework: dpv_ai
    target_id: Misinformation
    target_label: Misinformation
    target_url: https://w3c.github.io/dpv/2.3/ai/#Misinformation
    relation: closeMatch
  status: retired
  retirement_note: Dissolved in v0.3. behavioural-manipulation and synthetic-media-abuse moved to Security & Misuse / Harmful
    Misuse; disinformation-generation retired as redundant with hallucination.
- id: disinformation-generation
  type: subcategory
  broader: reliability-manipulation
  maturity: emerging
  label: Disinformation generation
  definition: Generation of false or misleading information at scale that can pollute the information ecosystem and erode
    consensus reality.
  scope: LLM
  lifecycle_stages:
  - post-processing
  status: retired
  retirement_note: Removed in v0.3 as redundant with hallucination (when non-intentional) or covered by misuse subcategories
    (when intentional).
- id: behavioural-manipulation
  type: subcategory
  broader: security-harmful-misuse
  maturity: emerging
  label: Behavioural manipulation
  definition: Subliminal influence, dark patterns, or exploitation of cognitive biases to steer user behaviour without informed
    consent.
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: synthetic-media-abuse
  type: subcategory
  broader: security-harmful-misuse
  maturity: emerging
  label: Synthetic media abuse
  definition: Generation of deepfakes, fake voices, or undisclosed AI-generated content used to deceive or harm.
  scope: LLM
  lifecycle_stages:
  - post-processing
- id: reliability-resilience
  type: subgroup
  broader: reliability
  label: Resilience
  definition: Risks related to the system's ability to absorb disruption, degrade gracefully, and recover. Particularly critical
    for AI deployed in conflict zones, humanitarian operations, or critical infrastructure.
  maturity: emerging
  mappings:
  - framework: nist_rmf
    target_id: secure-resilient
    target_label: Secure & Resilient
    relation: broadMatch
  - framework: eu_ai_act
    target_id: article-15-4
    target_label: Article 15(4) — Resilience regarding errors, faults or inconsistencies
    relation: broadMatch
- id: graceful-degradation
  type: subcategory
  broader: reliability-resilience
  maturity: emerging
  label: Graceful degradation
  definition: 'Absence of defined degradation pathways that allow the system to maintain partial function when components
    fail, connectivity is lost, or resources are constrained.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: edge-offline-operability
  type: subcategory
  broader: reliability-resilience
  maturity: emerging
  label: Edge and offline operability
  definition: 'System inability to function without continuous cloud access or network connectivity, creating single points
    of failure in environments with unreliable infrastructure.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: recovery-capability
  type: subcategory
  broader: reliability-resilience
  maturity: emerging
  label: Recovery capability
  definition: 'Lack of tested recovery procedures, rollback mechanisms, or recovery time objectives for restoring system function
    after disruption.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: infrastructure-dependency
  type: subcategory
  broader: reliability-resilience
  maturity: emerging
  label: Infrastructure dependency
  definition: 'Unmapped or unmitigated dependencies on external infrastructure (power, connectivity, cloud services, third-party
    APIs) whose failure would disable the system.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
- id: contextual-resilience
  type: subcategory
  broader: reliability-resilience
  maturity: emerging
  label: Contextual and ethical resilience
  definition: 'Absence of safeguards against function creep, weaponisation, or repurposing of the system against the populations
    it was designed to serve. Includes adequacy of consent mechanisms under power asymmetries and protection of beneficiary
    data in humanitarian or conflict contexts.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: governance
  type: category
  label: Governance
  alt_labels:
  - Accountability
  - Governance & Accountability
  definition: 'The risk that an AI system lacks adequate structures, policies, or accountability mechanisms to oversee its
    design, deployment, and use. Weak governance can lead to unclear responsibilities, poor documentation, limited auditability,
    and failure to align with legal, ethical, or organizational standards.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: governance & compliance
  mappings:
  - framework: mit
    target_id: subdomain-6.5
    target_label: Governance failure
    relation: closeMatch
  - framework: nist_600
    target_id: value-chain
    target_label: Value Chain & Component Integration
    relation: relatedMatch
  - framework: nist_rmf
    target_id: accountable-transparent
    target_label: Accountable & Transparent
    relation: closeMatch
  - framework: oecd
    target_id: principle-1.5
    target_label: Accountability
    relation: closeMatch
  - framework: iso_42001
    target_id: A.2-A.4
    target_label: AI Policy, Internal Organisation, Resources
    relation: broadMatch
- id: governance-accountability
  type: subgroup
  broader: governance
  label: Accountability
  definition: Risks from unclear allocation of responsibility, weak human oversight, and inadequate attribution mechanisms
    for AI system decisions and their adverse impacts.
  mappings:
  - framework: nist_rmf
    target_id: govern-function
    target_label: GOVERN function
    relation: broadMatch
  - framework: oecd
    target_id: principle-1.5
    target_label: Accountability
    relation: closeMatch
- id: unclear-responsibilities
  type: subcategory
  broader: governance-accountability
  maturity: established
  label: Unclear responsibilities and accountability gaps
  definition: 'Missing or ambiguous assignment of roles and responsibilities for AI system design, deployment, monitoring,
    and incident response.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
- id: responsible-actor-attribution
  type: subcategory
  broader: governance-accountability
  maturity: emerging
  label: Responsible actor attribution
  definition: 'Unclear or undocumented roles of developers, deployers, or reviewers, creating accountability gaps that can
    delay incident response or allow harmful practices to persist.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
  source: HRA
- id: oversight-of-adverse-impacts
  type: subcategory
  broader: governance-accountability
  maturity: emerging
  label: Oversight of significant adverse impacts
  definition: 'Missing processes for identifying, escalating, and responding to harmful outcomes, including psychological
    or physical harm and threats to human life.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
  source: HRA
- id: governance-documentation
  type: subgroup
  broader: governance
  label: Documentation & auditability
  definition: Risks from incomplete, inaccessible, or absent documentation and audit trails.
  mappings:
  - framework: iso_42001
    target_id: A.4
    target_label: Documentation and records
    relation: closeMatch
  - framework: eu_ai_act
    target_id: article-11
    target_label: Article 11 — Technical documentation
    relation: closeMatch
- id: poor-documentation
  type: subcategory
  broader: governance-documentation
  maturity: established
  label: Poor documentation
  definition: 'Incomplete, outdated, or absent documentation of system purpose, architecture, data sources, known limitations,
    and operational procedures.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  operationalisation:
  - id: model-card-completeness
    label: Model card completeness
    description: Incomplete or outdated documentation of model purpose, performance, limitations, or data sources, leading
      to inappropriate deployment or overestimation of capabilities.
- id: limited-auditability
  type: subcategory
  broader: governance-documentation
  maturity: established
  label: Limited auditability
  definition: 'Insufficient logging, versioning, or traceability for meaningful external review or internal audit.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
- id: decision-traceability
  type: subcategory
  broader: governance-documentation
  maturity: emerging
  label: Decision traceability
  definition: 'Inability to trace decisions made or influenced by the AI system back to specific inputs, processes, or actors,
    making it impossible to investigate harms or assign responsibility.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  source: HRA
- id: input-output-logging
  type: subcategory
  broader: governance-documentation
  maturity: emerging
  label: Critical input/output logging
  definition: 'Failure to log inputs and outputs systematically, hindering detection of failures, bias, or misuse. For LLMs,
    unlogged prompts may prevent tracking of harmful or sensitive interactions.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  source: HRA
- id: governance-compliance
  type: subgroup
  broader: governance
  label: Compliance & process
  definition: Risks from gaps in organisational processes for ongoing oversight, compliance, and lifecycle management of AI
    systems — including regulatory compliance, change management, data governance, monitoring and evaluation, remediation
    of failures, and incident response.
  mappings:
  - framework: iso_42001
    target_id: A.9.3
    target_label: Processes for responsible development and use
    relation: broadMatch
  - framework: eu_ai_act
    target_id: article-17
    target_label: Article 17 — Quality management system
    relation: relatedMatch
- id: regulatory-non-compliance
  type: subcategory
  broader: governance-compliance
  maturity: established
  label: Regulatory non-compliance
  definition: 'Failure to align with applicable legal, ethical, or organisational standards, including sector-specific regulations.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
- id: lack-of-change-management
  type: subcategory
  broader: governance-compliance
  maturity: established
  label: Lack of change management
  definition: 'Absence of controlled processes for system modifications, including uncontrolled changes to production systems.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: fitness-for-purpose
  type: subcategory
  broader: governance-compliance
  maturity: emerging
  label: Fitness for purpose and task effectiveness
  definition: The system has not been validated against the problem it is intended to solve, or does not achieve adequate
    or equitable task performance across subpopulations and input types. Covers both the ex ante question (was this designed
    for this problem?) and the ex post question (does it actually work?).
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  source: HRA
  alt_labels:
  - Fitness for purpose
  - Task success
- id: governance-data-oversight
  type: subgroup
  broader: governance
  label: Data & oversight
  definition: Risks from inadequate data governance, insufficient human oversight, and unvalidated task performance.
  mappings:
  - framework: iso_42001
    target_id: A.7
    target_label: Data management
    relation: relatedMatch
  - framework: eu_ai_act
    target_id: article-14
    target_label: Article 14 — Human oversight
    relation: relatedMatch
  status: retired
  retirement_note: Dissolved in v0.3. human-oversight-control moved to Accountability (oversight is fundamentally an accountability
    concern); data-governance moved to Compliance & process (data-related compliance and process management).
- id: data-governance
  type: subcategory
  broader: governance-compliance
  maturity: emerging
  label: Data governance
  definition: 'Inadequate labelling, tagging, approval, or appropriateness assessment of data, leading to downstream issues
    with fitness for purpose, bias, and compliance.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  source: HRA
- id: human-oversight-control
  type: subcategory
  broader: governance-accountability
  maturity: emerging
  label: Human oversight and control
  definition: 'Lack of defined intervention points, override capabilities, or human review mechanisms, allowing issues and
    threats to persist unchecked.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  source: HRA
- id: security-misuse
  type: category
  label: Security & Misuse
  alt_labels:
  - Safety, Security & Misuse
  - Security
  - Safety
  definition: The risk that an AI system is exposed to AI-specific vulnerabilities, attacks, or misuse that compromise its
    integrity, availability, or confidentiality. This covers risks beyond traditional IT security, including adversarial inputs,
    prompt injection, model extraction, jailbreaking, and supply-chain risks specific to AI components. It is intended to
    complement, not replace, standard IT security assessments.
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: technical soundness
  mappings:
  - framework: mit
    target_id: subdomain-2.2
    target_label: AI system security vulnerabilities & attacks
    relation: closeMatch
  - framework: mit
    target_id: domain-4
    target_label: Malicious Actors & Misuse
    relation: closeMatch
  - framework: nist_600
    target_id: information-security
    target_label: Information Security
    relation: closeMatch
  - framework: nist_rmf
    target_id: secure-resilient
    target_label: Secure & Resilient
    relation: closeMatch
  - framework: oecd
    target_id: principle-1.4
    target_label: Robustness, security & safety
    relation: broadMatch
  - framework: dpv_ai
    target_id: SecurityAttack
    target_label: Security Attack
    relation: broadMatch
- id: security-ai-attacks
  type: subgroup
  broader: security-misuse
  label: AI-specific attacks
  definition: Attack vectors specific to AI systems that exploit model behaviour or training processes.
  mappings:
  - framework: dpv_ai
    target_id: SecurityAttack
    target_label: Security Attack
    target_url: https://w3c.github.io/dpv/2.3/ai/#SecurityAttack
    relation: closeMatch
  - framework: mit
    target_id: subdomain-2.2
    target_label: AI system security vulnerabilities and attacks
    relation: closeMatch
- id: adversarial-attacks
  type: subcategory
  broader: security-ai-attacks
  maturity: established
  label: Adversarial attacks
  definition: 'Evasion, poisoning, and extraction attacks designed to manipulate system behaviour, corrupt training data,
    or steal model information.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
- id: prompt-injection
  type: subcategory
  broader: security-ai-attacks
  maturity: established
  label: Prompt injection
  alt_labels:
  - Prompt injection protection
  definition: 'Malicious inputs designed to subvert system intent by injecting instructions that override the system prompt,
    leading to harmful, deceptive, or unauthorized outputs.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
  source: HRA
  mappings:
  - framework: dpv_ai
    target_id: PromptInjection
    target_label: Prompt Injection
    relation: exactMatch
- id: jailbreaking
  type: subcategory
  broader: security-ai-attacks
  maturity: established
  label: Jailbreaking
  alt_labels:
  - Jailbreakability
  definition: 'Techniques used to bypass safety controls, content filters, or usage restrictions to trigger prohibited behaviours
    or outputs.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
  source: HRA
- id: model-extraction
  type: subcategory
  broader: security-ai-attacks
  maturity: established
  label: Model extraction
  definition: Attacks that aim to recover or replicate the underlying AI model, its parameters, or its training data through
    queried interactions, enabling intellectual property theft or further targeted attacks against the system.
  scope: ALL
  lifecycle_stages:
  - post-processing
  alt_labels:
  - Model stealing
  - Model inversion
- id: data-poisoning
  type: subcategory
  broader: security-ai-attacks
  maturity: established
  label: Data poisoning
  definition: Adversarial manipulation of training or fine-tuning data to introduce backdoors, bias, or systematic errors
    into the model. Includes both broad-spectrum poisoning (degrading overall performance) and targeted poisoning (creating
    exploitable triggers or specific failure modes).
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  alt_labels:
  - Training data poisoning
  - Backdoor attacks
- id: security-system
  type: subgroup
  broader: security-misuse
  label: System security
  definition: Risks related to access control and integrity of the AI system and its supply chain.
  mappings:
  - framework: nist_600
    target_id: '9'
    target_label: Information Security
    relation: closeMatch
  - framework: iso_42001
    target_id: A.6.2.3
    target_label: AI system technical documentation and information security
    relation: relatedMatch
- id: unauthorized-access
  type: subcategory
  broader: security-system
  maturity: established
  label: Unauthorized access
  definition: 'Exploitation of access control weaknesses to gain unauthorized access to the system, its data, or its administrative
    functions.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: supply-chain-vulnerabilities
  type: subcategory
  broader: security-system
  maturity: established
  label: Supply-chain vulnerabilities
  definition: 'Risks introduced through third-party components, pre-trained models, data sources, or other dependencies not
    fully under the deployer''s control.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
- id: security-operational
  type: subgroup
  broader: security-misuse
  label: Operational security
  definition: Risks from inadequate incident response and use of the system beyond its intended purpose.
  mappings:
  - framework: mit
    target_id: domain-4
    target_label: Malicious Actors and Misuse
    relation: closeMatch
  - framework: eu_ai_act
    target_id: article-15-5
    target_label: Article 15(5) — Cybersecurity
    relation: relatedMatch
  status: retired
  retirement_note: Dissolved in v0.3. misuse-beyond-intended-purpose moved to Security/Harmful Misuse; incident-response-gaps
    moved to Governance/Compliance & process.
- id: incident-response-gaps
  type: subcategory
  broader: governance-compliance
  maturity: established
  label: Incident response gaps
  definition: 'Insufficient detection, logging, escalation, or response capabilities for security incidents and misuse events.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: misuse-beyond-intended-purpose
  type: subcategory
  broader: security-harmful-misuse
  maturity: emerging
  label: Misuse beyond intended purpose
  definition: 'Use of the system for purposes it was not designed for, including repurposing for surveillance, manipulation,
    or other harmful applications.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: security-harmful-misuse
  type: subgroup
  broader: security-misuse
  label: Harmful Misuse
  definition: Risks from deliberate misuse of the AI system to generate harmful content, manipulate users, or operate beyond
    its intended purpose. These risks involve human intent — distinguishing them from unintentional system failures (which
    belong under Reliability).
- id: environmental-impact
  type: category
  label: Environmental Impact
  alt_labels:
  - Sustainability
  - Environmental sustainability
  definition: 'The risk that an AI system''s development, deployment, or use causes negative environmental effects, such as
    excessive energy or water consumption, carbon emissions, or unsustainable use of hardware and resources. This includes
    hidden impacts across the system''s lifecycle, from model training to long-term operation.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - in-processing
  - post-processing
  maturity: established
  perspective: technical soundness
  mappings:
  - framework: mit
    target_id: subdomain-6.6
    target_label: Environmental harm
    relation: closeMatch
  - framework: nist_600
    target_id: environmental
    target_label: Environmental Impacts
    relation: closeMatch
  - framework: oecd
    target_id: principle-1.1
    target_label: Inclusive growth, sustainable development & well-being
    relation: broadMatch
- id: inference-energy-consumption
  type: subcategory
  broader: environmental-impact
  maturity: emerging
  label: Inference-time energy consumption
  definition: 'High energy use during deployment and inference, increasing environmental impact and infrastructure costs.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  source: HRA
- id: training-resource-consumption
  type: subcategory
  broader: environmental-impact
  maturity: emerging
  label: Training resource consumption
  definition: 'Significant carbon emissions, energy use, and water consumption associated with model training, particularly
    for large-scale foundation models.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  source: HRA
- id: hardware-efficiency
  type: subcategory
  broader: environmental-impact
  maturity: emerging
  label: Hardware efficiency
  definition: 'Poor hardware utilisation increasing costs, environmental footprint, and limiting the feasibility of equitable
    access to AI capabilities.

    '
  scope: ALL
  lifecycle_stages:
  - in-processing
  - post-processing
  source: HRA
- id: transparency-explainability
  type: category
  label: Transparency & Explainability
  alt_labels:
  - Explainability & Transparency
  - Transparency and Explainability
  definition: 'The risk that stakeholders cannot understand how an AI system works, what it does, or why it produces specific
    outputs. Lack of transparency undermines informed consent, impedes oversight, and erodes trust.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  maturity: established
  perspective: governance & compliance
  note: 'In the RAIA Guide, this category is assessed only at the Post-Processing stage.

    '
  mappings:
  - framework: mit
    target_id: subdomain-7.4
    target_label: Lack of transparency or interpretability
    relation: closeMatch
  - framework: nist_rmf
    target_id: explainable-interpretable
    target_label: Explainable & Interpretable
    relation: closeMatch
  - framework: oecd
    target_id: principle-1.3
    target_label: Transparency & explainability
    relation: closeMatch
  - framework: dpv_ai
    target_id: Transparency
    target_label: Transparency
    relation: broadMatch
- id: transparency-explainability-group
  type: subgroup
  broader: transparency-explainability
  label: Explainability
  definition: Risks from stakeholders being unable to understand why the system produces specific outputs.
  mappings:
  - framework: nist_rmf
    target_id: explainable
    target_label: Explainable & Interpretable
    relation: closeMatch
  - framework: mit
    target_id: subdomain-7.4
    target_label: Lack of transparency or interpretability
    relation: closeMatch
- id: system-explainability
  type: subcategory
  broader: transparency-explainability-group
  maturity: emerging
  label: AI system explainability
  definition: 'Stakeholders misinterpret or misunderstand the intended purpose or use of an AI system based on its outputs,
    due to insufficient explanation of how outputs are produced.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  source: HRA
  operationalisation:
  - id: prompt-transparency
    label: Prompt transparency
    description: Whether the system's underlying prompts, instructions, or guiding context are visible or comprehensible to
      users. Particularly relevant for LLM-based systems where outputs depend heavily on hidden system prompts that shape
      behaviour.
- id: right-to-explanation-contestation
  type: subcategory
  broader: transparency-explainability-group
  maturity: established
  label: Right to explanation and contestation
  definition: The risk that affected individuals are not informed about decisions taken with AI assistance, do not receive
    a meaningful explanation of those decisions, or have no effective channel to challenge or appeal them. Includes obligations
    under GDPR Article 22 (rights regarding automated individual decision-making) and EU AI Act Article 13 (transparency and
    provision of information to deployers and affected persons).
  scope: ADM
  lifecycle_stages:
  - post-processing
  alt_labels:
  - Right to explanation
  - Right to contest
  - Absence of appeal mechanisms
  - Ineffective communication with affected parties
  operationalisation:
  - id: absence-of-appeal
    label: Absence of appeal mechanisms
    description: No accessible process for individuals to challenge or appeal AI-driven decisions that affect them.
  - id: ineffective-communication
    label: Ineffective communication with affected parties
    description: Failure to inform individuals about how they have been affected by AI-driven decisions and what options are
      available to them.
- id: prompt-transparency
  type: subcategory
  broader: transparency-explainability-group
  maturity: emerging
  label: Prompt transparency
  definition: 'Inconsistent outputs to semantically similar inputs that confuse users and erode trust. For LLMs, variation
    across generations may lead to contradictory advice or conflicting factual claims.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
  source: HRA
  status: retired
  retirement_note: Reframed in v0.3 as operationalisation, not a risk in itself. Now appears as operationalisation under system-explainability.
- id: transparency-communication
  type: subgroup
  broader: transparency-explainability
  label: Communication & disclosure
  definition: Risks from inadequate communication about system capabilities, limitations, and AI involvement.
  mappings:
  - framework: eu_ai_act
    target_id: article-13
    target_label: Article 13 — Transparency and provision of information to deployers
    relation: closeMatch
  - framework: oecd
    target_id: principle-1.3
    target_label: Transparency and explainability
    relation: closeMatch
- id: stakeholder-communication
  type: subcategory
  broader: transparency-communication
  maturity: emerging
  label: Inadequate disclosure of system capabilities and limitations
  alt_labels:
  - Communication to relevant interested parties
  - Communication to stakeholders
  definition: The AI system's capabilities, limitations, intended use cases, and known failure modes are not communicated
    clearly to deployers, users, or affected parties, leading to misuse, over-reliance, or under-reliance on the system.
  scope: ALL
  lifecycle_stages:
  - post-processing
  source: HRA
- id: ai-interaction-disclosure
  type: subcategory
  broader: transparency-communication
  maturity: emerging
  label: Disclosure of AI interaction
  definition: 'Users interacting with an AI system under the assumption that they are communicating with a human, without
    clear disclosure.

    '
  scope: LLM
  lifecycle_stages:
  - post-processing
  source: HRA
- id: model-card-completeness
  type: subcategory
  broader: transparency-communication
  maturity: emerging
  label: Model card completeness
  definition: 'Incomplete or outdated documentation of model purpose, performance, limitations, or data sources, leading to
    inappropriate deployment or overestimation of capabilities.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
  source: HRA
  status: retired
  retirement_note: Reframed in v0.3 as operationalisation, not a risk in itself. Now appears as operationalisation under poor-documentation
    (Governance).
- id: incident-reporting-redress
  type: category
  label: Incident Reporting & Redress
  definition: The risk that when AI-driven decisions cause harm, there are no effective mechanisms to report incidents, escalate
    concerns, challenge decisions, or seek remedy. This includes absence of appeal mechanisms, unclear remediation procedures,
    and failure to communicate with affected parties.
  scope: ALL
  lifecycle_stages:
  - post-processing
  maturity: emerging
  perspective: rights & ethics
  note: 'In the RAIA Guide, this category is assessed only at the Post-Processing stage.

    '
  mappings:
  - framework: nist_rmf
    target_id: accountable-transparent
    target_label: Accountable & Transparent
    relation: broadMatch
  - framework: oecd
    target_id: accountability
    target_label: Accountability
    relation: broadMatch
  - framework: eu_ai_act
    target_id: article-73
    target_label: Article 73 — Reporting of serious incidents
    relation: relatedMatch
  - framework: dpv_ai
    target_id: RightToRemedy
    target_label: Right to Remedy
    target_url: https://w3c.github.io/dpv/2.3/dpv/#RightToRemedy
    relation: broadMatch
  alt_labels:
  - Responsibility & Redress
  status: retired
  retirement_note: 'Dissolved in v0.3. Subcategories redistributed: absence-of-appeal and ineffective-communication absorbed
    into right-to-explanation-contestation (Transparency); unclear-remediation absorbed into failure-remediation-gaps (Governance
    / Compliance & process). EU AI Act Art. 73 obligations on serious incident reporting are covered by incident-response-gaps
    in Governance.'
- id: absence-of-appeal
  type: subcategory
  broader: incident-reporting-redress
  maturity: emerging
  label: Absence of appeal mechanisms
  definition: 'No accessible process for individuals to challenge or appeal AI-driven decisions that affect them.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  status: retired
  retirement_note: Absorbed into right-to-explanation-contestation in v0.3 (Transparency & Explainability category).
- id: unclear-remediation
  type: subcategory
  broader: incident-reporting-redress
  maturity: emerging
  label: Unclear remediation procedures
  definition: 'Absence of defined processes for correcting harms caused by AI system errors or failures.

    '
