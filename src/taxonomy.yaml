- id: ineffective-communication
  type: subcategory
  broader: incident-reporting-redress
  maturity: emerging
  label: Ineffective communication with affected parties
  definition: 'Failure to inform individuals about how they have been affected by AI-driven decisions and what options are
    available to them.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
  status: retired
  retirement_note: Absorbed into right-to-explanation-contestation in v0.3 (Transparency & Explainability category).
- id: autonomy-agency
  type: category
  label: Autonomy & Agency
  alt_labels:
  - Autonomy & Human Agency
  - Agentic Risks
  - Human-AI Interaction
  definition: The risk that an AI system undermines human agency or operates with insufficient human control. This includes
    over-reliance on AI outputs, automation bias, deskilling, and — for agentic AI systems — failure modes arising from multi-step
    autonomous actions, tool use, or coordination with other AI agents.
  scope: ALL
  lifecycle_stages:
  - post-processing
  maturity: emerging
  perspective: rights & ethics
  mappings:
  - framework: mit
    target_id: domain-5
    target_label: Human-Computer Interaction
    relation: closeMatch
  - framework: nist_600
    target_id: '7'
    target_label: Human-AI Configuration
    relation: closeMatch
  - framework: dpv_ai
    target_id: HumanOversight
    target_label: Human Oversight
    target_url: https://w3c.github.io/dpv/2.3/ai/#HumanOversight
    relation: broadMatch
  - framework: eu_ai_act
    target_id: article-14
    target_label: Article 14 — Human oversight
    relation: broadMatch
- id: autonomy-human-agency
  type: subgroup
  broader: autonomy-agency
  label: Human agency
  definition: Risks to human decision-making capacity arising from interaction with AI systems.
  mappings:
  - framework: mit
    target_id: subdomain-5.1
    target_label: Overreliance and unsafe use
    relation: closeMatch
- id: automation-bias
  label: Automation bias
  definition: Over-reliance on automated outputs, accepting AI recommendations without sufficient scrutiny, leading to missed
    errors and reduced human judgment.
  scope: ALL
  type: subcategory
  broader: autonomy-human-agency
  maturity: emerging
  lifecycle_stages:
  - post-processing
- id: trust-calibration
  label: Trust calibration
  definition: Inappropriate levels of trust in AI outputs — either excessive trust leading to uncritical acceptance, or insufficient
    trust leading to underuse of valuable AI capabilities.
  scope: ALL
  type: subcategory
  broader: autonomy-human-agency
  maturity: emerging
  lifecycle_stages:
  - post-processing
- id: deskilling
  label: Deskilling
  definition: Erosion of human skills, expertise, or professional judgment through prolonged delegation of tasks to AI systems.
  scope: ALL
  type: subcategory
  broader: autonomy-human-agency
  maturity: emerging
  lifecycle_stages:
  - post-processing
- id: over-reliance
  label: Over-reliance on AI
  definition: Systemic dependence on AI systems that leaves individuals or organisations unable to function when the system
    is unavailable or produces incorrect outputs.
  scope: ALL
  type: subcategory
  broader: autonomy-human-agency
  maturity: emerging
  lifecycle_stages:
  - post-processing
- id: autonomy-system-autonomy
  type: subgroup
  broader: autonomy-agency
  label: System autonomy
  definition: Risks from AI systems operating with a degree of autonomy beyond single-inference interactions.
  mappings:
  - framework: mit
    target_id: subdomain-7.6
    target_label: Multi-agent risks
    relation: closeMatch
- id: multi-step-actions
  label: Multi-step autonomous actions
  definition: AI systems that plan and execute sequences of actions, where errors in early steps cascade unpredictably through
    later steps.
  scope: LLM
  type: subcategory
  broader: autonomy-system-autonomy
  maturity: emerging
  lifecycle_stages:
  - post-processing
- id: tool-use-risks
  label: Tool use risks
  definition: AI systems that interact with external tools, APIs, or services, creating unintended side effects or security
    exposures.
  scope: LLM
  type: subcategory
  broader: autonomy-system-autonomy
  maturity: emerging
  lifecycle_stages:
  - post-processing
- id: emergent-behaviour
  label: Emergent behaviour
  definition: Unexpected capabilities or behaviours arising from agent interactions, multi-model coordination, or complex
    system dynamics that were not anticipated during design.
  scope: LLM
  type: subcategory
  broader: autonomy-system-autonomy
  maturity: emerging
  lifecycle_stages:
  - post-processing
- id: loss-of-human-control
  label: Loss of meaningful human control
  definition: AI systems operating at speeds or complexity levels that make meaningful human oversight impractical, including
    inability to understand, interrupt, or reverse autonomous decisions.
  scope: ALL
  type: subcategory
  broader: autonomy-system-autonomy
  maturity: emerging
  lifecycle_stages:
  - post-processing
- id: organisational-readiness
  type: category
  label: Organisational Readiness
  alt_labels:
  - Integration Readiness
  - Deployment Readiness
  - Sociotechnical Fit
  definition: The risk that an AI system fails to deliver value not because of model performance issues but because it does
    not fit the organisational, technical, or human context into which it is deployed. This includes insufficient organisational
    capacity to absorb the technology, workflow incompatibility, interoperability failures with existing systems, and lack
    of sustainable maintenance capability.
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
  maturity: emerging
  perspective: operational viability
  mappings:
  - framework: nist_rmf
    target_id: map
    target_label: MAP function — context and deployment environment
    relation: relatedMatch
  - framework: iso_42001
    target_id: A.10
    target_label: Third-party and customer relationships
    relation: relatedMatch
- id: org-preparedness
  type: subcategory
  broader: organisational-readiness
  maturity: emerging
  label: Organisational preparedness
  definition: 'The deploying organisation lacks the governance maturity, leadership engagement, change management capacity,
    staff competency, or cultural receptivity needed to absorb an AI system into its operations.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
- id: technical-interoperability
  type: subcategory
  broader: organisational-readiness
  maturity: emerging
  label: Technical interoperability
  definition: 'The AI system cannot integrate with existing infrastructure, legacy systems, data pipelines, or standards (e.g.,
    HL7 FHIR in healthcare) required for it to function in the deployment environment.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
  - post-processing
- id: workflow-compatibility
  type: subcategory
  broader: organisational-readiness
  maturity: emerging
  label: Workflow compatibility
  definition: 'The system''s outputs, alerts, or interfaces do not fit existing human workflows, leading to alert fatigue,
    workarounds, or abandonment. Includes inadequate end-user involvement in design and testing, and poor context transferability
    from development to deployment environment.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: deployment-sustainability
  type: subcategory
  broader: organisational-readiness
  maturity: emerging
  label: Deployment sustainability
  definition: 'The organisation lacks the capacity for ongoing operation, maintenance, monitoring, and improvement of the
    AI system after initial deployment. Includes vendor lock-in risk, dependency on external expertise, and unclear cost-effectiveness
    or value proposition.

    '
  scope: ALL
  lifecycle_stages:
  - post-processing
- id: institutional-capacity
  type: subcategory
  broader: organisational-readiness
  maturity: emerging
  label: Institutional absorptive capacity
  definition: 'The broader institutional or societal context lacks foundational capabilities (digital infrastructure, data
    literacy, regulatory frameworks) needed before AI deployment is viable. Premature deployment may reallocate scarce resources,
    exacerbate inequality, or create technological dependency.

    '
  scope: ALL
  lifecycle_stages:
  - pre-processing
